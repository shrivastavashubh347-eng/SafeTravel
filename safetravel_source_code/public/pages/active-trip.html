<!-- Active Trip Dashboard -->
<div class="page" id="page-active-trip">
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
    <div>
      <h2 style="font-size: 20px; font-weight: 800;">Live Trip</h2>
      <p style="color: var(--accent-green); font-size: 12px; font-weight: 600;">🟢 Protection Active</p>
    </div>
    <button class="btn btn-outline btn-sm" style="width:auto;" onclick="SafeTravel.trip.endTrip()">End Trip</button>
  </div>

  <!-- Live Map -->
  <div class="trip-map-container">
    <div id="active-trip-map" style="height: 100%;"></div>
  </div>

  <!-- Check-in Timer -->
  <div class="trip-timer">
    <div class="trip-timer-label">Next Check-in In</div>
    <div class="trip-timer-value" id="trip-countdown">--:--</div>
    <div style="font-size: 11px; color: var(--text-muted);" id="trip-heartbeat-status">Heartbeat: Connected</div>
  </div>

  <!-- Trip Controls -->
  <div class="trip-controls">
    <button class="btn btn-safe" onclick="SafeTravel.checkin.confirmSafe()">
      <span class="btn-icon">✅</span> I'm Safe
    </button>
    <button class="btn btn-danger" onclick="SafeTravel.sos.trigger('manual')">
      <span class="btn-icon">🆘</span> SOS
    </button>
  </div>

  <!-- Driver Details Card -->
  <div class="card" id="trip-driver-card" style="display:none;">
    <div class="card-header" style="cursor:pointer;" onclick="this.parentElement.querySelector('.driver-expanded').classList.toggle('collapsed')">
      <span class="card-icon">🚗</span>
      <div style="flex:1;">
        <div class="card-title">Driver & Vehicle</div>
        <div class="card-subtitle">Tap to expand details</div>
      </div>
      <span style="color: var(--text-muted);">▾</span>
    </div>
    <div class="driver-expanded">
      <div class="driver-card">
        <img id="trip-active-driver-photo" class="driver-photo" src="" alt="Driver" style="display:none;">
        <div class="driver-info">
          <div class="driver-name" id="trip-active-driver-name">—</div>
          <div class="driver-vehicle" id="trip-active-vehicle-number">—</div>
        </div>
      </div>
      <img id="trip-active-vehicle-photo" style="width:100%; border-radius:8px; margin-top:12px; display:none;" alt="Vehicle">
    </div>
  </div>

  <!-- Battery Saver Toggle -->
  <div class="toggle-container">
    <span class="toggle-label">🔋 Battery Saver Mode</span>
    <label class="toggle-switch">
      <input type="checkbox" id="battery-saver-toggle" onchange="SafeTravel.trip.toggleBatterySaver(this.checked)">
      <div class="toggle-track"></div>
      <div class="toggle-knob"></div>
    </label>
  </div>

  <!-- Share Tracking Link -->
  <div class="card" style="margin-top:8px;">
    <div class="card-header">
      <span class="card-icon">📡</span>
      <div>
        <div class="card-title">Share Live Location</div>
        <div class="card-subtitle">Let contacts track you in real-time</div>
      </div>
    </div>
    <div class="share-grid">
      <button class="share-btn share-whatsapp" onclick="SafeTravel.trip.shareWhatsApp()">
        <span class="share-btn-icon">💬</span> WhatsApp
      </button>
      <button class="share-btn share-copy" onclick="SafeTravel.trip.copyTrackingLink()">
        <span class="share-btn-icon">📋</span> Copy Link
      </button>
    </div>
  </div>
</div>
