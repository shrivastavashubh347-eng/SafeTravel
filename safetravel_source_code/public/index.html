<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="SafeTravel - Industrial-grade travel safety app with real-time tracking, safety check-ins, and emergency SOS protocols">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>SafeTravel — Stay Safe, Stay Connected</title>
  
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <!-- App CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="loading-shield">🛡️</div>
      <h1 class="loading-title">SafeTravel</h1>
      <p class="loading-subtitle">Your Safety, Our Priority</p>
      <div class="loading-bar"><div class="loading-progress"></div></div>
    </div>
  </div>

  <!-- Main App Container -->
  <div id="app" class="app-container" style="display:none;">
    <!-- Top Header Bar -->
    <header id="top-header" class="top-header">
      <div class="header-left">
        <div class="logo-mark">🛡️</div>
        <h1 class="app-title">SafeTravel</h1>
      </div>
      <div class="header-right">
        <button id="sos-header-btn" class="sos-mini-btn" onclick="SafeTravel.navigateTo('sos')" title="Emergency SOS">
          SOS
        </button>
      </div>
    </header>

    <!-- Page Container -->
    <main id="page-container" class="page-container">
      <!-- Pages are loaded here dynamically -->
    </main>

    <!-- Safety Check-in Modal -->
    <div id="checkin-modal" class="modal-overlay" style="display:none;">
      <div class="checkin-modal">
        <div class="checkin-ring">
          <svg viewBox="0 0 120 120" class="countdown-svg">
            <circle cx="60" cy="60" r="54" class="countdown-bg"/>
            <circle cx="60" cy="60" r="54" class="countdown-progress" id="countdown-ring"/>
          </svg>
          <span class="countdown-time" id="countdown-time">60</span>
        </div>
        <h2 class="checkin-title">Are You Safe?</h2>
        <p class="checkin-subtitle">Please respond within the countdown</p>
        <div class="checkin-actions">
          <button class="btn btn-safe" id="btn-im-safe" onclick="SafeTravel.checkin.confirmSafe()">
            <span class="btn-icon">✅</span> I'm Safe
          </button>
          <button class="btn btn-danger" id="btn-need-help" onclick="SafeTravel.checkin.needHelp()">
            <span class="btn-icon">🚨</span> I Need Help
          </button>
        </div>
      </div>
    </div>

    <!-- Route Deviation Alert Banner -->
    <div id="route-alert" class="route-alert" style="display:none;">
      <div class="route-alert-content">
        <span class="route-alert-icon">⚠️</span>
        <span class="route-alert-text" id="route-alert-text">Route deviation detected!</span>
        <button class="route-alert-dismiss" onclick="document.getElementById('route-alert').style.display='none'">✕</button>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-item active" data-page="home" onclick="SafeTravel.navigateTo('home')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-page="trip-setup" onclick="SafeTravel.navigateTo('trip-setup')">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">Trip</span>
      </button>
      <button class="nav-item sos-nav" data-page="sos" onclick="SafeTravel.navigateTo('sos')">
        <span class="nav-icon sos-icon">🆘</span>
        <span class="nav-label">SOS</span>
      </button>
      <button class="nav-item" data-page="profile" onclick="SafeTravel.navigateTo('profile')">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </button>
      <button class="nav-item" data-page="settings" onclick="SafeTravel.navigateTo('settings')">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>
  </div>

  <!-- External Libraries -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="https://unpkg.com/localforage@1.10.0/dist/localforage.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  
  <!-- App Modules -->
  <script src="/js/storage.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/location.js"></script>
  <script src="/js/route-monitor.js"></script>
  <script src="/js/checkin.js"></script>
  <script src="/js/sos.js"></script>
  <script src="/js/trip.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
